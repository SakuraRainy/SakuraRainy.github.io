<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>炫酷赛博风小游戏集</title>
  <style>
    :root {
      --card-bg: rgba(32,40,48,0.98);
      --accent: #12ffe7;
      --accent2: #f70776;
      --card-radius: 20px;
      --shadow-cyber: 0 0 16px #08f7fe, 0 0 24px #2ff3e0, 0 0 40px #f70776;
    }
    body {
      margin:0;
      padding:0;
      background: linear-gradient(135deg,#050505 70%,#101969 100%);
      min-height:100vh;
      font-family: 'Consolas','Fira Code','微软雅黑',monospace;
      color:#f6f6f6;
    }
    h1 {
      text-align:center;
      margin: 36px 0 18px 0;
      letter-spacing: 2px;
      font-size:2.3em;
      color:var(--accent);
      text-shadow: var(--shadow-cyber);
    }
    .card-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 0 0 60px 0;
    }
    .game-card {
      width: 280px;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-cyber);
      padding: 24px 18px;
      cursor:pointer;
      position:relative;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid transparent;
      overflow: hidden;
    }
    .game-card:hover {
      border: 2px solid var(--accent2);
      transform:translateY(-6px) scale(1.05) rotate(1deg);
      box-shadow: 0 0 24px #f70776, 0 0 20px #08f7fe;
    }
    .game-card h2 {
      margin: 0 0 10px 0;
      color: var(--accent2);
      letter-spacing: 1px;
      font-size:1.4em;
    }
    .game-card p {
      margin:0;
      color: #c7c7c7;
      font-size:1em;
      line-height: 1.5;
    }
    .cyber-glow {
      color: var(--accent);
      text-shadow: 0 0 8px #08f7fe, 0 0 16px #f70776;
      font-weight:bold;
    }
    /* 响应式 */
    @media (max-width:620px){
      .card-list {gap:10px;}
      .game-card {width:96vw; min-width:0;}
      h1 {font-size:1.4em;}
    }
    /* 弹窗 */
    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100vw; height:100vh;
      backdrop-filter: blur(2px);
      background:rgba(0,0,0,0.82);
      z-index:99;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display:flex;
    }
    .modal-content {
      background:var(--card-bg);
      color:#fafafa;
      border-radius:20px;
      padding:0;
      box-shadow:0 0 40px #2ff3e0, 0 0 60px #f70776;
      position: relative;
      width: 94vw;
      max-width: 480px;
      min-height: 350px;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-title {
      background: linear-gradient(90deg,#08f7fe 40%, #f70776 85%);
      color:#12161c;
      font-weight:bold;
      font-size:1.2em;
      padding:10px 26px;
      letter-spacing:1px;
    }
    .modal-close {
      position:absolute;
      right:12px; top:10px;
      background: none;
      border: none;
      color: #f70776;
      font-size: 1.2em;
      cursor: pointer;
      font-weight:bold;
      text-shadow:0 0 9px #fff3;
    }
    .modal-body {
      padding: 18px 12px 12px 12px;
      flex:1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 游戏内可重用的样式 */
    .game-canvas { background:#191c23; border-radius:10px; box-shadow: 0 0 10px #12ffe7; }
    .game-btn {
      outline:none; border:none; background:linear-gradient(90deg,#2ff3e0,#f70776);
      color:#fff; font-size:1.05em; border-radius:10px; padding:6px 18px; margin:10px 0 0 0;
      letter-spacing:1px; cursor:pointer; font-family:inherit; font-weight:bold;
      box-shadow:0 0 8px #08f7fe;
      transition:background 0.2s, box-shadow 0.2s;
    }
    .game-btn:active {background:linear-gradient(90deg,#f70776,#08f7fe);}
    .score-text {font-size:1.08em;color:var(--accent);}
  </style>
</head>

<body>
  <h1>炫酷赛博风小游戏集 <span class="cyber-glow">Cyber Fun Zone</span></h1>
  <section class="card-list">
    <div class="game-card" data-game="snake">
      <h2>贪吃蛇 Snake</h2>
      <p>经典蛇蛇，每得分一只变长一格。方向键或滑动操作。</p>
    </div>
    <div class="game-card" data-game="tetris">
      <h2>俄罗斯方块 Tetris</h2>
      <p>熟悉的下落方块，左右移动、旋转，消灭整行方块。</p>
    </div>
    <div class="game-card" data-game="2048">
      <h2>2048</h2>
      <p>滑动合并数块，凑成2048！ 支持触摸与键盘操作。</p>
    </div>
    <div class="game-card" data-game="guess">
      <h2>猜数字</h2>
      <p>输入1-100间的数字，猜到即胜，看看能几步！</p>
    </div>
  </section>

  <!-- 弹窗（多个游戏复用同一个弹窗） -->
  <div class="modal" id="modal-root">
    <div class="modal-content">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    // ==== 弹窗管理 ====
    function closeModal(){
      document.getElementById('modal-root').classList.remove('active');
      document.getElementById('modal-body').innerHTML='';
    }
    window.closeModal = closeModal;

    // 适配触屏，关闭弹窗
    document.getElementById('modal-root').addEventListener('click',function(e){
      if(e.target===this) closeModal();
    });

    // ==== 游戏卡片事件 ====
    document.querySelectorAll('.game-card').forEach(card=>{
      card.onclick = ()=>{
        let game = card.dataset.game;
        switch(game){
          case 'snake': openSnake(); break;
          case 'tetris': openTetris(); break;
          case '2048': open2048(); break;
          case 'guess': openGuess(); break;
        }
      }
    });

    // ==== 1. 贪吃蛇 ====
    function openSnake(){
      document.getElementById('modal-title').textContent='贪吃蛇 Snake';
      document.getElementById('modal-body').innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;align-items:center;">
          <canvas id="snake-canvas" width="320" height="320" class="game-canvas"></canvas>
          <div class="score-text" id="snake-score">得分: 0</div>
          <button class="game-btn" onclick="restartSnake()">重新开始</button>
        </div>
      `;
      document.getElementById('modal-root').classList.add('active');
      startSnake();
    }
    let snakeGame={};
    function startSnake(){
      const block=20, sz=16, W=block*sz, H=block*sz;
      let canvas=document.getElementById('snake-canvas'),ctx=canvas.getContext('2d');
      let snake=[[8,8],[8,9],[8,10]],dir=[0,-1],apple=[Math.floor(Math.random()*sz),Math.floor(Math.random()*sz)];
      let score=0,alive=true, timer=null;
      function draw(){
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle="#2ff3e0";
        for(let [x,y] of snake) ctx.fillRect(x*block+2,y*block+2,block-4,block-4);
        ctx.fillStyle="#f70776";
        ctx.fillRect(apple[0]*block+2,apple[1]*block+2,block-4,block-4);
      }
      function move(){
        if(!alive) return;
        let nx=snake[0][0]+dir[0],ny=snake[0][1]+dir[1];
        if(nx<0||nx>=sz||ny<0||ny>=sz||snake.some(([x,y])=>x===nx&&y===ny)){
          alive=false;
          document.getElementById('snake-score').textContent='Game Over! 得分: '+score;
          clearInterval(timer);
          return;
        }
        snake.unshift([nx,ny]);
        if(nx===apple[0]&&ny===apple[1]){
          score++; genApple();
        }else{
          snake.pop();
        }
        document.getElementById('snake-score').textContent='得分: '+score;
        draw();
      }
      function genApple(){
        do{
          apple=[Math.floor(Math.random()*sz),Math.floor(Math.random()*sz)];
        }while(snake.some(([x,y])=>x===apple[0]&&y===apple[1]));
      }
      function keydown(e){
        let d={'ArrowUp':[0,-1],'ArrowDown':[0,1],'ArrowLeft':[-1,0],'ArrowRight':[1,0]};
        if(d[e.key]){
          let nd=d[e.key];
          // 禁止180°掉头
          if(snake.length>1&&(nd[0]===-dir[0]&&nd[1]===-dir[1])) return;
          dir=nd;
          e.preventDefault();
        }
      }
      // 触摸滑动
      let touchS=null;
      canvas.ontouchstart=e=>touchS=[e.touches[0].clientX,e.touches[0].clientY];
      canvas.ontouchmove=e=>{
        if(!touchS) return;
        let dx=e.touches[0].clientX-touchS[0],dy=e.touches[0].clientY-touchS[1];
        if(Math.abs(dx)>30||Math.abs(dy)>30){
          if(Math.abs(dx)>Math.abs(dy)){
            if(dx>0&&dir[0]!==-1) dir=[1,0];
            if(dx<0&&dir[0]!==1) dir=[-1,0];
          }else{
            if(dy>0&&dir[1]!==-1) dir=[0,1];
            if(dy<0&&dir[1]!==1) dir=[0,-1];
          }
          touchS=null;
        }
      };
      document.addEventListener('keydown',keydown);
      timer = setInterval(move,120);
      draw();
      snakeGame={timer,keydown};
    }
    function restartSnake(){
      if(snakeGame.timer) clearInterval(snakeGame.timer);
      document.removeEventListener('keydown',snakeGame.keydown);
      startSnake();
    }
    window.restartSnake = restartSnake;

    // ==== 2. 俄罗斯方块 ====
    function openTetris(){
      document.getElementById('modal-title').textContent='俄罗斯方块 Tetris';
      document.getElementById('modal-body').innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;align-items:center;">
          <canvas id="tetris-canvas" width="200" height="400" class="game-canvas"></canvas>
          <div class="score-text" id="tetris-score">分数: 0</div>
          <button class="game-btn" onclick="restartTetris()">重新开始</button>
        </div>
      `;
      document.getElementById('modal-root').classList.add('active');
      startTetris();
    }
    let tetrisGame={};
    function startTetris(){
      const W=10,H=20,block=20;
      let canvas=document.getElementById('tetris-canvas'),ctx=canvas.getContext('2d');
      let board=Array(H).fill(0).map(()=>Array(W).fill(0));
      const shapes=[
        [[1,1,1,1]], // I
        [[1,1],[1,1]],//O
        [[0,1,0],[1,1,1]],//T
        [[1,0,0],[1,1,1]],//L
        [[0,0,1],[1,1,1]],//J
        [[0,1,1],[1,1,0]],//S
        [[1,1,0],[0,1,1]] //Z
      ];
      const colors=['#2ff3e0','#f70776','#fcf951','#fff773','#9208fe','#ff87d4','#12ffe7'];
      let cur=null,nx=null,pos=[0,3],score=0,alive=true,timer=null;
      function randomShape(){
        let i=Math.floor(Math.random()*shapes.length);
        return {matrix:shapes[i].map(r=>r.slice()),color:colors[i]};
      }
      function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let y=0;y<H;++y)for(let x=0;x<W;++x)
          if(board[y][x]){ ctx.fillStyle=board[y][x]; ctx.fillRect(x*block,y*block,block,block);}
        if(cur){
          ctx.globalAlpha=0.888;
          for(let y=0;y<cur.matrix.length;++y)
            for(let x=0;x<cur.matrix[0].length;++x)
              if(cur.matrix[y][x]){ ctx.fillStyle=cur.color; ctx.fillRect((x+pos[1])*block,(y+pos[0])*block,block,block);}
          ctx.globalAlpha=1;
        }
      }
      function collide(np=pos,mat=cur.matrix){
        for(let y=0;y<mat.length;++y)
          for(let x=0;x<mat[0].length;++x)
            if(mat[y][x]&&((np[0]+y)>=H||np[1]+x<0||np[1]+x>=W||(board[np[0]+y]&&(board[np[0]+y][np[1]+x]))))
              return true;
        return false;
      }
      function merge(){
        for(let y=0;y<cur.matrix.length;++y)
          for(let x=0;x<cur.matrix[0].length;++x)
            if(cur.matrix[y][x])
              board[pos[0]+y][pos[1]+x]=cur.color;
      }
      function clearRow(){
        let cleared=0;
        for(let y=H-1;y>=0;--y){
          if(board[y].every(x=>x)){
            board.splice(y,1);
            board.unshift(Array(W).fill(0));
            ++cleared;
            ++y;
          }
        }
        score+=cleared*110;
        document.getElementById('tetris-score').textContent='分数: '+score;
      }
      function drop(){
        if(!alive) return;
        let np=[pos[0]+1,pos[1]];
        if(!collide(np)){
          pos=np;
        }else{
          merge();
          clearRow();
          newPiece();
        }
        draw();
      }
      function newPiece(){
        cur=nx||randomShape();
        nx=randomShape();
        pos=[0,3];
        if(collide())
        { alive=false;
          document.getElementById('tetris-score').textContent='Game Over! 分数: '+score;
          clearInterval(timer); return;}
      }
      function hardDrop(){
        while(!collide([pos[0]+1,pos[1]])) pos[0]++;
        drop();
      }
      function rotate(){
        let m=cur.matrix;
        let r=m[0].map((_,i)=>m.map(row=>row[i]).reverse());
        if(!collide(pos,r)) cur.matrix=r;
        draw();
      }
      function left(){ if(!collide([pos[0],pos[1]-1])){pos[1]--;draw();} }
      function right(){ if(!collide([pos[0],pos[1]+1])){pos[1]++;draw();} }
      function keydown(e){
        if(!alive)return;
        switch(e.key){
          case'ArrowUp': rotate();break;
          case'ArrowRight': right();break;
          case'ArrowLeft': left();break;
          case'ArrowDown': drop();break;
          case' ': hardDrop();break;
        }
      }
      // 触摸：左右滑，轻点旋转，下滑加速
      let lastTouch=null, moved=false;
      canvas.ontouchstart=e=>{
        lastTouch=[e.touches[0].clientX, e.touches[0].clientY];
        moved=false;
      };
      canvas.ontouchmove=e=>{
        if(!alive)return;
        if(!lastTouch)return;
        let [x0,y0]=lastTouch, x1=e.touches[0].clientX, y1=e.touches[0].clientY;
        let dx=x1-x0, dy=y1-y0;
        if(Math.abs(dx)>32 && Math.abs(dx)>Math.abs(dy)){ moved=true;
          if(dx>0)right(); else left();
          lastTouch=[x1,y1];
        }else if(Math.abs(dy)>32){ moved=true;
          drop();
          lastTouch=[x1,y1];
        }
      };
      canvas.ontouchend = e=>{
        if(!alive)return;
        if(!moved) rotate();
      };
      document.addEventListener('keydown',keydown);
      // 初始化
      newPiece();draw();
      timer = setInterval(drop,450);
      tetrisGame={timer,keydown};
    }
    function restartTetris(){
      if(tetrisGame.timer) clearInterval(tetrisGame.timer);
      document.removeEventListener('keydown',tetrisGame.keydown);
      startTetris();
    }
    window.restartTetris = restartTetris;

    // ==== 3. 2048游戏 ====
    function open2048(){
      document.getElementById('modal-title').textContent='2048';
      document.getElementById('modal-body').innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;align-items:center;">
          <canvas id="2048-canvas" width="320" height="320" class="game-canvas"></canvas>
          <div class="score-text" id="g2048-score">分数: 0</div>
          <button class="game-btn" onclick="restart2048()">重新开始</button>
        </div>
      `;
      document.getElementById('modal-root').classList.add('active');
      start2048();
    }
    let g2048={};
    function start2048(){
      let sz=4,block=72,g=Array(sz).fill(0).map(()=>Array(sz).fill(0)),score=0,win=false,over=false,timer=0;
      let canvas=document.getElementById('2048-canvas'), ctx=canvas.getContext('2d');
      function addtile(){
        let emp=[];
        for(let y=0;y<sz;++y)for(let x=0;x<sz;++x)
          if(!g[y][x]) emp.push([y,x]);
        if(emp.length){
          let [y,x]=emp[Math.floor(Math.random()*emp.length)];
          g[y][x]=Math.random()<0.15?4:2;
        }
      }
      function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let y=0;y<sz;++y)for(let x=0;x<sz;++x){
          let v=g[y][x];
          ctx.fillStyle=(v?`hsl(${190+Math.log2(v)*35},80%,55%)`:'#222c30');
          ctx.fillRect(x*block+10,y*block+10,block-20,block-20);
          if(v){
            ctx.fillStyle='#fff';
            ctx.font='bold 25px monospace';
            ctx.textAlign='center';
            ctx.fillText(v,x*block+block/2+2,y*block+block/2+10);
          }
        }
      }
      function move(dir){
        let moved=false;
        let merge=Array(sz).fill(0).map(()=>Array(sz).fill(false));
        function walker(y,x,dy,dx,f){
          while(y>=0&&y<sz&&x>=0&&x<sz){f(y,x);y+=dy;x+=dx;}
        }
        // 不同方向遍历顺序
        let list=[];
        if(dir==='up'){ for(let x=0;x<sz;x++) for(let y=1;y<sz;y++) list.push([y,x]); }
        if(dir==='down'){ for(let x=0;x<sz;x++) for(let y=sz-2;y>=0;y--) list.push([y,x]); }
        if(dir==='left'){ for(let y=0;y<sz;y++) for(let x=1;x<sz;x++) list.push([y,x]); }
        if(dir==='right'){ for(let y=0;y<sz;y++) for(let x=sz-2;x>=0;x--) list.push([y,x]); }
        for(let [y,x] of list){
          if(!g[y][x])continue;
          let ny=y,nx=x;
          while(true){
            let ty=ny,t x=nx;
            if(dir==='up')    { ty=ny-1; if(ty<0)break;}
            if(dir==='down')  { ty=ny+1; if(ty>=sz)break;}
            if(dir==='left')  { tx=nx-1; if(tx<0)break;}
            if(dir==='right') { tx=nx+1; if(tx>=sz)break;}
            if(!g[ty][tx]){ g[ty][tx]=g[ny][nx]; g[ny][nx]=0; ny=ty; nx=tx; moved=true;}
            else if(g[ty][tx]===g[ny][nx]&&!merge[ty][tx]){
              g[ty][tx]*=2; g[ny][nx]=0; merge[ty][tx]=true;
              score+=g[ty][tx]; moved=true;
              if(g[ty][tx]===2048) win=true;
              break;
            } else break;
          }
        }
        if(moved) addtile();
        draw();
        document.getElementById('g2048-score').textContent=(win?'赢了! ':'分数: ')+score;
        if(!canmove()) {
          over=true;
          document.getElementById('g2048-score').textContent='Game Over! '+score;
        }
      }
      function canmove(){
        for(let y=0;y<sz;y++)for(let x=0;x<sz;x++)
          if(!g[y][x])return true;
        for(let y=0;y<sz;y++)for(let x=0;x<sz-1;x++)if(g[y][x]===g[y][x+1])return true;
        for(let x=0;x<sz;x++)for(let y=0;y<sz-1;y++)if(g[y][x]===g[y+1][x])return true;
        return false;
      }
      function keydown(e){
        if(win||over)return;
        if('ArrowUpArrowDownArrowLeftArrowRight'.includes(e.key)){
          move({'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right'}[e.key]);e.preventDefault();
        }
      }
      let touchS=null;
      canvas.ontouchstart=e=>touchS=[e.touches[0].clientX,e.touches[0].clientY];
      canvas.ontouchend=e=>{
        if(!touchS)return;
        let dx=e.changedTouches[0].clientX-touchS[0],dy=e.changedTouches[0].clientY-touchS[1];
        if(Math.abs(dx)>30||Math.abs(dy)>30){
          if(Math.abs(dx)>Math.abs(dy)) move(dx>0?"right":"left"); else move(dy>0?"down":"up");
        }
        touchS=null;
      };
      // 初始化/重启
      for(let y=0;y<sz;y++)for(let x=0;x<sz;x++)g[y][x]=0;
      addtile(); addtile(); draw();
      document.getElementById('g2048-score').textContent='分数: '+score;
      document.addEventListener('keydown',keydown);
      g2048={keydown};
    }
    function restart2048(){
      document.removeEventListener('keydown',g2048.keydown);
      start2048();
    }
    window.restart2048 = restart2048;

    // ==== 4. 猜数字（简易）====
    function openGuess(){
      document.getElementById('modal-title').textContent='猜数字';
      document.getElementById('modal-body').innerHTML=`
        <div style="width:100%;display:flex;flex-direction:column;align-items:center;">
          <div id="guess-tip" style="text-align:center;min-height:1.8em;"></div>
          <input id="guess-input" style="margin:8px 0;padding:6px 8px;font-size:1.14em;width:90px;text-align:center;border-radius:10px;border:2px solid #2ff3e0;background:#191c23;color:#fff;outline:none;" type="number" min="1" max="100" placeholder="1~100"/>
          <button class="game-btn" onclick="submitGuess()">猜</button>
          <div style="margin-top:8px;color:#f70776;font-size:1em;" id="guess-result"></div>
          <div id="guess-steps" style="color:#6effef;margin-top:5px;"></div>
          <button class="game-btn" style="margin-top:8px;" onclick="restartGuess()">再来一次</button>
        </div>
      `;
      document.getElementById('modal-root').classList.add('active');
      startGuess();
    }
    let guessNum = 0, guessStep = 0, guessOver=false;
    function startGuess(){
      guessNum = Math.floor(Math.random()*100)+1;
      guessStep=0;
      guessOver=false;
      document.getElementById('guess-tip').textContent='我藏了一个1-100的数字，试试能几步猜到！';
      document.getElementById('guess-result').textContent='';
      document.getElementById('guess-steps').textContent='';
      document.getElementById('guess-input').value='';
    }
    function submitGuess(){
      if(guessOver)return;
      let inp=document.getElementById('guess-input');
      let n = parseInt(inp.value);
      if(isNaN(n) || n<1 || n>100)
        {document.getElementById('guess-result').textContent='输入1到100'; return;}
      guessStep++;
      if(n<guessNum) document.getElementById('guess-result').textContent='猜大点~';
      else if(n>guessNum) document.getElementById('guess-result').textContent='猜小点~';
      else {
        document.getElementById('guess-result').textContent='猜对了！🎉';
        document.getElementById('guess-steps').textContent='总共用了 '+guessStep+' 步。';
        guessOver=true;
      }
      inp.value='';
      inp.focus();
    }
    function restartGuess(){
      startGuess();
    }
    window.submitGuess = submitGuess;
    window.restartGuess = restartGuess;

    // 弹窗关闭时移除游戏监听
    document.getElementById('modal-root').addEventListener('transitionend',()=>{
      if(!document.getElementById('modal-root').classList.contains('active')){
        if(snakeGame.timer) clearInterval(snakeGame.timer); document.removeEventListener('keydown',snakeGame.keydown);
        if(tetrisGame.timer) clearInterval(tetrisGame.timer); document.removeEventListener('keydown',tetrisGame.keydown);
        document.removeEventListener('keydown',g2048.keydown);
      }
    });
  </script>
</body>
</html>
