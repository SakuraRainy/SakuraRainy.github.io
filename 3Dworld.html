<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>3D解密游戏示例</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #overlay {
      position: absolute; left: 0; top: 0; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); z-index: 1; color: #fff; font-size: 2em; display: none;
      flex-direction: column;
    }
    #inputBox { font-size: 1em; margin-top: 10px;}
    #msg { font-size:1.2em; margin-top:20px;}
    #win-message { color: yellow; font-size: 2.5em;}
  </style>
</head>
<body>
<div id="overlay">
  <div>输入密码以打开盒子：</div>
  <input id="inputBox" type="text" maxlength="8" autocomplete="off" />
  <button onclick="submitAnswer()">解锁</button>
  <div id="msg"></div>
</div>
<div id="win-message" style="display:none;">解谜成功，你胜利了！</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/OrbitControls.min.js"></script>
<script>
let scene, camera, renderer, controls;
let box, boxOpened = false;
const boxPassword = "1234";
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// 初始化3D场景
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2c3e50);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 2, 5);

  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.2;

  // 房间地板与墙
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.MeshStandardMaterial({color: 0x888888}));
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -0.01;
  scene.add(floor);

  const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10,5), new THREE.MeshStandardMaterial({color: 0x555577}));
  backWall.position.z = -5; backWall.position.y = 2.5;
  scene.add(backWall);

  // 盒子 (谜题对象)
  box = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({color:0xAA6600})
  );
  box.position.set(0,0.5,0);
  scene.add(box);

  // 盒子上的锁提示
  const lockGeo = new THREE.TorusGeometry(0.15, 0.04, 16, 100, Math.PI);
  const lockMat = new THREE.MeshStandardMaterial({color:0x222222});
  const lock = new THREE.Mesh(lockGeo, lockMat);
  lock.position.set(0,1.1,0); lock.rotation.x = Math.PI/2;
  box.add(lock);

  // 灯光
  const light = new THREE.PointLight(0xffffff, 1, 100);
  light.position.set(3, 6, 3); scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));

  // 监听点击
  renderer.domElement.addEventListener('pointerdown', onPointerDown);

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// 点击处理
function onPointerDown(event) {
  if (boxOpened) return;
  mouse.x = ( event.clientX / window.innerWidth ) * 2 - 1;
  mouse.y = - ( event.clientY / window.innerHeight ) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(box, false);
  if (intersects.length > 0) {
    showOverlay();
  }
}

// 显示输入密码界面
function showOverlay() {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('inputBox').value = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('inputBox').focus();
}

// 密码输入
window.submitAnswer = function() {
  const val = document.getElementById('inputBox').value.trim();
  if (val === boxPassword) {
    openBox();
  } else {
    document.getElementById('msg').textContent = "密码错误！";
  }
}

// 打开盒子动画/胜利
function openBox() {
  boxOpened = true;
  document.getElementById('overlay').style.display = 'none';
  // 模拟箱盖开合效果
  const lid = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.1,1),
    new THREE.MeshStandardMaterial({color:0xDD9900})
  );
  lid.position.y = 0.55;
  lid.position.z = 0;
  lid.position.x = 0;
  lid.rotation.x = Math.PI / 2;
  box.add(lid);
  // 动画打开
  let t=0;
  function lidAnim() {
    if (t < Math.PI/2) {
      lid.rotation.z = -t;
      t += 0.05;
      requestAnimationFrame(lidAnim);
    } else {
      showWin();
    }
  }
  lidAnim();
}

function showWin() {
  document.getElementById('win-message').style.display = 'block';
}

window.addEventListener('resize', ()=> {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
