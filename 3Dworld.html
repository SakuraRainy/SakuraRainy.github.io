<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>移动端3D世界模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;background:#87ceeb;font-family:system-ui;}
canvas{display:block;width:100vw;height:100vh;}

/* 手机虚拟摇杆 */
#joystick{
    position:fixed;
    left:20px;bottom:20px;
    width:120px;height:120px;
    background:rgba(255,255,255,0.25);
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.4);
    touch-action:none;
}
#stick{
    position:absolute;
    width:40px;height:40px;
    background:rgba(255,255,255,0.6);
    border-radius:50%;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
}
</style>
</head>
<body>
<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script>
// ===== 场景初始化 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0,22,32);

const renderer = new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 灯光
const ambientLight = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff,0.8);
dirLight.position.set(60,90,50);
scene.add(dirLight);

// 草地地面
const groundGeo = new THREE.PlaneGeometry(220,220);
const groundMat = new THREE.MeshLambertMaterial({color:0x4a9c2d});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 生成树木
function createTree(x,z){
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5,0.6,4,8),
        new THREE.MeshLambertMaterial({color:0x6b4423})
    );
    trunk.position.set(x,2,z);

    const leaf = new THREE.Mesh(
        new THREE.ConeGeometry(3,6,8),
        new THREE.MeshLambertMaterial({color:0x228b22})
    );
    leaf.position.set(x,7,z);
    scene.add(trunk,leaf);
}
for(let i=0;i<25;i++){
    createTree((Math.random()-0.5)*140,(Math.random()-0.5)*140);
}

// 玩家红色方块
const player = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshLambertMaterial({color:0xff3333})
);
player.position.y=1;
scene.add(player);

// ===== 控制变量 =====
let moveSpeed = 0.25;
let keys={};
let cameraAngleY=0,cameraAngleX=0.3;
let touchStartX=0,touchStartY=0;
let joystick={dx:0,dy:0};

// ===== 电脑键盘WASD =====
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ===== 手机触屏：右侧滑动旋转视角 =====
document.addEventListener('touchstart',e=>{
    if(e.touches[0].clientX > innerWidth/2){
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
},{passive:true});

document.addEventListener('touchmove',e=>{
    if(e.touches[0].clientX > innerWidth/2){
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        cameraAngleY += dx*0.004;
        cameraAngleX -= dy*0.004;
        cameraAngleX = Math.max(-0.7,Math.min(1.2,cameraAngleX));
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }
},{passive:true});

// 双指缩放
document.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
        const d = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        camera.position.z = THREE.MathUtils.clamp(40 - d*0.08,15,80);
    }
},{passive:true});

// ===== 左侧虚拟摇杆 =====
const joystickEl = document.getElementById('joystick');
const stickEl = document.getElementById('stick');
const joyR = joystickEl.offsetWidth/2;

joystickEl.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t = e.touches[0];
    const rect = joystickEl.getBoundingClientRect();
    let x = t.clientX - rect.left - joyR;
    let y = t.clientY - rect.top - joyR;
    const len = Math.hypot(x,y);
    if(len>joyR){x=x/len*joyR;y=y/len*joyR;}
    stickEl.style.transform = `translate(${x}px,${y}px)`;
    joystick.dx = x/joyR;
    joystick.dy = y/joyR;
});

joystickEl.addEventListener('touchend',()=>{
    stickEl.style.transform = 'translate(-50%,-50%)';
    joystick.dx=0;joystick.dy=0;
});

// ===== 动画循环 =====
function animate(){
    requestAnimationFrame(animate);

    // 移动逻辑：电脑键盘 + 手机摇杆
    let dirX=0,dirZ=0;
    if(keys['w']) dirZ -= moveSpeed;
    if(keys['s']) dirZ += moveSpeed;
    if(keys['a']) dirX -= moveSpeed;
    if(keys['d']) dirX += moveSpeed;

    dirX += joystick.dx * moveSpeed;
    dirZ -= joystick.dy * moveSpeed;

    player.position.x += dirX;
    player.position.z += dirZ;

    // 相机环绕跟随
    const radius = camera.position.z;
    camera.position.x = Math.sin(cameraAngleY)*radius*Math.cos(cameraAngleX);
    camera.position.z = Math.cos(cameraAngleY)*radius*Math.cos(cameraAngleX);
    camera.position.y = 20 + Math.sin(cameraAngleX)*15;
    camera.lookAt(player.position);

    renderer.render(scene,camera);
}

// 窗口自适应
window.addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
});

animate();
</script>
</body>
</html>
