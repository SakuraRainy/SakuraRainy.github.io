<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>2048 手机版</title>
  <style>
    body { background: #faf8ef; font-family: sans-serif; margin: 0; }
    .container { max-width: 400px; margin: 20px auto 0 auto; padding: 10px; background: #bbada0; border-radius: 8px; }
    h1 { text-align: center; color: #776e65; }
    .board {
      width: 100%; height: 100vw; max-width: 360px; max-height: 360px;
      margin: 10px auto; background: #bbada0; border-radius: 6px; display: grid;
      grid-template: repeat(4, 1fr) / repeat(4, 1fr); gap: 7px;
    }
    .cell {
      background: #cdc1b4; border-radius: 3px;
      font-size: 2em; line-height: 2.4em; text-align: center;
      font-weight: bold; color: #776e65; user-select: none;
      transition: 0.1s;
    }
    .score-bar {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
    }
    .score { background: #eee4da; color: #bbada0; border-radius: 4px; padding: 4px 10px; }
    .btn { background: #8f7a66; color: #fff; border: none; border-radius: 4px; padding: 5px 10px; }
    .gameover {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: rgba(238, 228, 218,0.73);
      display: flex; justify-content: center; align-items: center; font-size: 2.4em; color: #776e65; z-index: 2;
    }
    @media (max-width: 400px) {
      .container { max-width: 98vw; padding:2vw;}
      .board { height: 98vw; max-width: 98vw; max-height: 98vw;}
    }
    ::selection { background: transparent; }
  </style>
</head>
<body>
  <div class="container">
    <h1>2048</h1>
    <div class="score-bar">
      <div class="score" id="score">分数: 0</div>
      <button class="btn" onclick="restartGame()">新游戏</button>
    </div>
    <div style="position:relative;">
      <div class="board" id="board"></div>
      <div class="gameover" id="gameover" style="display:none;">
        游戏结束!
        <button onclick="restartGame()" style="margin-left:15px;" class="btn">再来一局</button>
      </div>
    </div>
    <div style="text-align:center; font-size:0.95em; color:#7a7262; margin-top:10px;">
      滑动或用方向键合并相同数字！目标：2048
    </div>
  </div>

  <script>
    // 游戏核心逻辑
    const SIZE = 4;
    let board = [];
    let score = 0;
    const colors = {
      2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',
      256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'
    };

    function initBoard() {
      board = Array.from({length:SIZE},_=>Array(SIZE).fill(0));
      score = 0;
      addTile(); addTile();
      render();
      document.getElementById('gameover').style.display = 'none';
    }

    function addTile() {
      let empty = [];
      for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]===0) empty.push([r,c]);
      if(!empty.length)return;
      let [r,c] = empty[Math.floor(Math.random()*empty.length)];
      board[r][c] = Math.random()<0.9?2:4;
    }

    function render() {
      const boardDiv = document.getElementById('board');
      boardDiv.innerHTML = '';
      for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        let v = board[r][c];
        cell.textContent = v>0?v:'';
        cell.style.background = colors[v]||'#cdc1b4';
        boardDiv.appendChild(cell);
      }
      document.getElementById('score').textContent = '分数: ' + score;
    }

    function move(dir) {
      let moved = false;
      let merged = Array.from({length:SIZE},_=>Array(SIZE).fill(false));
      let prevBoard = JSON.stringify(board);

      function moveLine(line) {
        let arr = line.filter(x=>x>0);
        for(let i=0;i<arr.length-1;i++) {
          if(arr[i]===arr[i+1]){ arr[i]*=2; score+=arr[i]; arr[i+1]=0; }
        }
        return arr.filter(x=>x>0).concat(Array(SIZE).fill(0)).slice(0,SIZE);
      }

      if(dir==='left') {
        for(let r=0;r<SIZE;r++) board[r]=moveLine(board[r]);
      }
      else if(dir==='right') {
        for(let r=0;r<SIZE;r++) board[r]=moveLine(board[r].slice().reverse()).reverse();
      }
      else if(dir==='up') {
        for(let c=0;c<SIZE;c++) {
          let col = board.map(row=>row[c]);
          let newCol = moveLine(col);
          for(let r=0;r<SIZE;r++) board[r][c]=newCol[r];
        }
      }
      else if(dir==='down') {
        for(let c=0;c<SIZE;c++) {
          let col = board.map(row=>row[c]).reverse();
          let newCol = moveLine(col).reverse();
          for(let r=0;r<SIZE;r++) board[r][c]=newCol[r];
        }
      }
      if(JSON.stringify(board)!==prevBoard) {
        addTile(); moved = true;
        setTimeout(()=>{ if(isGameOver()) endGame(); },16);
      }
      render();
      return moved;
    }

    function isGameOver() {
      for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++)
        if(board[r][c]===0) return false;
      for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE-1;c++)
        if(board[r][c]===board[r][c+1]) return false;
      for(let r=0;r<SIZE-1;r++) for(let c=0;c<SIZE;c++)
        if(board[r][c]===board[r+1][c]) return false;
      return true;
    }
    function endGame() {
      document.getElementById('gameover').style.display = '';
    }
    function restartGame() {
      initBoard();
    }
    // 键盘操作
    window.addEventListener('keydown',e=>{
      if(document.getElementById('gameover').style.display!=='none') return;
      if('ArrowLeftArrowRightArrowUpArrowDown'.includes(e.key)) e.preventDefault();
      if(e.key==='ArrowLeft') move('left');
      else if(e.key==='ArrowRight') move('right');
      else if(e.key==='ArrowUp') move('up');
      else if(e.key==='ArrowDown') move('down');
    });
    // 手机触摸操作
    let sx,sy,ex,ey;
    const MIN_DIST = 18;
    document.getElementById('board').addEventListener('touchstart',e=>{
      if(e.touches.length===1){
        sx=e.touches[0].clientX; sy=e.touches[0].clientY; ex=sx; ey=sy;
      }
    });
    document.getElementById('board').addEventListener('touchmove',e=>{
      if(e.touches.length===1){
        ex=e.touches[0].clientX; ey=e.touches[0].clientY;
      }
    });
    document.getElementById('board').addEventListener('touchend',e=>{
      let dx=ex-sx,dy=ey-sy;
      if(Math.abs(dx)<MIN_DIST&&Math.abs(dy)<MIN_DIST) return;
      if(Math.abs(dx)>Math.abs(dy)) move(dx<0?'left':'right');
      else move(dy<0?'up':'down');
    });
    // 初始
    initBoard();
  </script>
</body>
</html>
