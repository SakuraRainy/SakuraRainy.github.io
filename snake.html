<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>贪吃蛇 手机版</title>
  <style>
    body { background:#1c1c1c; font-family:sans-serif; margin:0;}
    .container { max-width:380px; margin:30px auto 0 auto; background:#23262b; border-radius:9px; padding:12px; }
    h1 { color:#ff9234; text-align:center; letter-spacing:0.2em;}
    #score { text-align:center; color:#fff; font-size:1.07em; margin-top:-7px;}
    #wrap { position:relative; max-width:338px; margin:10px auto;}
    #board { display:block; width:100%; background:#111; border-radius:8px; }
    #gameover {
      position:absolute; z-index:2;left:0;top:0;width:100%;height:100%;
      background:rgba(44,39,55,0.88); display:flex;justify-content:center;align-items:center;flex-direction:column;
      color:#fff;font-size:2em;display:none;
    }
    .btn { margin-top:20px;padding:9px 20px;background:#ff9234;color:#fff;border:none;border-radius:4px;font-size:1em;}
    .ctrls {margin:14px auto 2px auto; display:flex; justify-content:space-around;gap:0;max-width:300px;}
    .ctrls button{
      flex:1 1 0;font-size:1.2em;padding:7px 0;margin:0 5px;background:#444;border:none;color:#fff;border-radius:5px;
      touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    }
    @media (max-width: 400px){
      .container{max-width:99vw;padding:2vw;}
      #wrap{max-width:99vw;}
    }
  </style>
</head>
<body>
<div class="container">
  <h1>贪吃蛇</h1>
  <div id="score">分数: 0</div>
  <div id="wrap" style="aspect-ratio:1/1;">
    <canvas id="board" width="320" height="320"></canvas>
    <div id="gameover">
      <div>游戏结束</div>
      <button class="btn" onclick="restart()">再来一局</button>
    </div>
  </div>
  <div class="ctrls">
    <button onclick="manualDir('left')">◀️</button>
    <button onclick="manualDir('up')">▲</button>
    <button onclick="manualDir('down')">▼</button>
    <button onclick="manualDir('right')">▶️</button>
  </div>
  <div style="margin-top:8px;text-align:center;color:#ffeca8;font-size:0.97em;">
    方向键/WASD/滑动/点击按钮控制方向
  </div>
</div>
<script>
const N=20, CELL=16; // 20x20格
let canvas=document.getElementById('board'),ctx=canvas.getContext('2d');
let snake,dir,nextDir,food,score,timer,dead;
function init() {
  snake = [[10,10],[9,10],[8,10]];
  dir = [1,0]; nextDir=[1,0];
  food = spawnFood();
  score=0;dead=false;
  document.getElementById('score').textContent="分数: "+score;
  document.getElementById('gameover').style.display='none';
}
function draw() {
  ctx.fillStyle="#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
  // 食物
  ctx.fillStyle="#ff5233";
  ctx.fillRect(food[0]*CELL,food[1]*CELL,CELL,CELL);
  // 蛇
  ctx.fillStyle="#22c365";
  for(let i=1;i<snake.length;i++){
    ctx.fillRect(snake[i][0]*CELL+2,snake[i][1]*CELL+2,CELL-4,CELL-4);
  }
  ctx.fillStyle="#fff963";
  ctx.fillRect(snake[0][0]*CELL+1,snake[0][1]*CELL+1,CELL-2,CELL-2);
}
function spawnFood() {
  while(1){
    let x=Math.floor(Math.random()*N),y=Math.floor(Math.random()*N);
    if(!snake.some(seg=>seg[0]===x&&seg[1]===y)) return [x,y];
  }
}
function step() {
  if(dead)return;
  dir = nextDir;
  let [dx,dy]=dir;
  let [hx,hy]=snake[0];
  let nx=hx+dx, ny=hy+dy;
  // 撞墙或撞自己
  if(nx<0||nx>=N||ny<0||ny>=N || snake.some(seg=>seg[0]==nx&&seg[1]==ny)){
    over(); return;
  }
  snake.unshift([nx,ny]);
  if(nx===food[0]&&ny===food[1]){
    score++; food=spawnFood();
    document.getElementById('score').textContent="分数: "+score;
  }else{
    snake.pop();
  }
  draw();
}
function over(){
  dead=true;
  document.getElementById('gameover').style.display='';
  clearInterval(timer);
}
function manualDir(cmd){
  let d=dir;
  if(cmd==='left' && d[0]!=1) nextDir=[-1,0];
  else if(cmd==='right' && d[0]!=-1) nextDir=[1,0];
  else if(cmd==='up' && d[1]!=1) nextDir=[0,-1];
  else if(cmd==='down' && d[1]!=-1) nextDir=[0,1];
}
document.addEventListener('keydown',e=>{
  let key=e.key.toLowerCase();
  if(key==='arrowleft'||key==='a') manualDir('left');
  else if(key==='arrowright'||key==='d') manualDir('right');
  else if(key==='arrowup'||key==='w') manualDir('up');
  else if(key==='arrowdown'||key==='s') manualDir('down');
});
// 移动端滑动手势
let sx,sy;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length==1){ sx=e.touches[0].clientX; sy=e.touches[0].clientY;}
});
canvas.addEventListener('touchend',e=>{
  if(typeof sx!=="number")return;
  let dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<10 && Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0) manualDir('right'); else manualDir('left');
  }else{
    if(dy>0) manualDir('down'); else manualDir('up');
  }
  sx=sy=null;
});
function restart() { init(); draw(); timer=setInterval(step,120); }
init(); draw(); timer=setInterval(step,120);
</script>
</body>
</html>
