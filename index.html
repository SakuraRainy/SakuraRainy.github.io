<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>田果田，欢迎回来</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #111;
      color: #00FF41;
      font-family: 'Fira Mono', 'Consolas', 'Courier New', monospace;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .hacker-container {
      text-align: center;
      font-size: 2rem;
      letter-spacing: 2px;
      text-shadow:
        0 0 2px #00FF41,
        0 0 10px #00FF41,
        0 0 20px #00FF41,
        0 0 40px #00c837;
    }
    .blinker {
      display: inline-block;
      width: 1ch;
      background: #00FF41;
      animation: blink 0.65s step-end infinite;
      height: 2rem;
      vertical-align: bottom;
      margin-left: 4px;
    }
    @keyframes blink {
      50% { background: transparent; }
    }
    .glitch {
      position: relative;
      display: inline-block;
      animation: glitch 1.5s infinite linear alternate-reverse;
    }
    @keyframes glitch {
      0% { left:0; }
      20% { left:-1px; }
      40% { left:2px; }
      60% { left:-2px; }
      80% { left:1px; }
      100% { left:0; }
    }
  </style>
</head>
<body>
  <div class="hacker-container">
    <span class="glitch" id="hacker-text"></span>
    <span class="blinker"></span>
  </div>
  <script>
    // 打字机动画效果
    const message = '田果田，欢迎回来';
    const el = document.getElementById('hacker-text');
    let i = 0;

    function typeWriter() {
      if (i <= message.length) {
        el.innerText = message.slice(0, i);
        i++;
        setTimeout(typeWriter, 180);
      }
    }
    typeWriter();
  </script>
</body>
</html>
