<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D世界｜手机完美版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;background:#87ceeb;font-family:system-ui;}
canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0;}

/* 虚拟摇杆 */
#joystick{
    position:fixed;
    left:20px;bottom:20px;
    width:120px;height:120px;
    background:rgba(255,255,255,0.22);
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.35);
    z-index:10;
    touch-action:none;
}
#stick{
    position:absolute;
    width:40px;height:40px;
    background:rgba(255,255,255,0.65);
    border-radius:50%;
    left:50%;top:50%;
    transform:translate(-50%,-50%);
}
</style>
</head>
<body>
<div id="joystick"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script>
// 场景
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0,22,32);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 灯光
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dirLight = new THREE.DirectionalLight(0xffffff,0.8);
dirLight.position.set(60,90,50);
scene.add(dirLight);

// 草地
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(220,220),
    new THREE.MeshLambertMaterial({color:0x4a9c2d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 生成树
function createTree(x,z){
    const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.5,0.6,4,8),
        new THREE.MeshLambertMaterial({color:0x6b4423})
    );
    trunk.position.set(x,2,z);
    const leaf = new THREE.Mesh(
        new THREE.ConeGeometry(3,6,8),
        new THREE.MeshLambertMaterial({color:0x228b22})
    );
    leaf.position.set(x,7,z);
    scene.add(trunk,leaf);
}
for(let i=0;i<25;i++) createTree((Math.random()-0.5)*140,(Math.random()-0.5)*140);

// 玩家
const player = new THREE.Mesh(new THREE.BoxGeometry(2,2,2),new THREE.MeshLambertMaterial({color:0xf44336}));
player.position.y=1;
scene.add(player);

// 控制变量
let moveSpeed = 0.25;
let keys={};
let cameraAngleY=0, cameraAngleX=0.4;
let touchX=0, touchY=0;
let joy={x:0,y:0};

// 电脑键盘
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// 右侧触摸旋转视角（只在屏幕右半区生效）
document.addEventListener('touchstart',e=>{
    if(e.touches.length===1 && e.touches[0].clientX > innerWidth/2){
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
    }
},{passive:true});

document.addEventListener('touchmove',e=>{
    // 单指右半屏 = 转视角
    if(e.touches.length===1 && e.touches[0].clientX>innerWidth/2){
        const dx = e.touches[0].clientX - touchX;
        const dy = e.touches[0].clientY - touchY;
        cameraAngleY += dx * 0.004;
        cameraAngleX -= dy * 0.004;
        cameraAngleX = Math.max(-0.6, Math.min(1.1, cameraAngleX));
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
    }
    // 双指缩放
    if(e.touches.length===2){
        const dist = Math.hypot(
            e.touches[0].clientX-e.touches[1].clientX,
            e.touches[0].clientY-e.touches[1].clientY
        );
        camera.position.z = THREE.MathUtils.clamp(45 - dist*0.07,12,90);
    }
},{passive:true});

// 左侧摇杆【修复方向反向问题】
const joyBox = document.getElementById('joystick');
const stick = document.getElementById('stick');
const joyR = joyBox.offsetWidth/2;

joyBox.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t = e.touches[0];
    const rect = joyBox.getBoundingClientRect();
    let x = t.clientX - rect.left - joyR;
    let y = t.clientY - rect.top - joyR;
    const len = Math.hypot(x,y);
    if(len>joyR){x=x/len*joyR;y=y/len*joyR;}
    stick.style.transform = `translate(${x}px,${y}px)`;
    joy.x = x/joyR;
    joy.y = y/joyR;
});

joyBox.addEventListener('touchend',()=>{
    stick.style.transform = 'translate(-50%,-50%)';
    joy.x=0; joy.y=0;
});

// 动画
function animate(){
    requestAnimationFrame(animate);
    let dx=0,dz=0;

    // 电脑WASD
    if(keys['w']) dz-=moveSpeed;
    if(keys['s']) dz+=moveSpeed;
    if(keys['a']) dx-=moveSpeed;
    if(keys['d']) dx+=moveSpeed;

    // 手机摇杆（修复Y轴反向）
    dx += joy.x * moveSpeed;
    dz += joy.y * moveSpeed;

    player.position.x += dx;
    player.position.z += dz;

    // 相机环绕
    const radius = camera.position.z;
    camera.position.x = Math.sin(cameraAngleY)*radius*Math.cos(cameraAngleX);
    camera.position.z = Math.cos(cameraAngleY)*radius*Math.cos(cameraAngleX);
    camera.position.y = 18 + Math.sin(cameraAngleX)*16;
    camera.lookAt(player.position);

    renderer.render(scene,camera);
}

// 自适应
window.addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

animate();
</script>
</body>
</html>
