<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音画布 - 随时随地创作音乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            transition: opacity 2s ease, transform 2s ease;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        #hint .sub {
            display: block;
            font-size: 14px;
            margin-top: 16px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
        }

        #info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <canvas id="visualizer"></canvas>
    
    <div id="hint">
        点击屏幕，制作声音
        <span class="sub">Y轴控制音量 · X轴控制音高</span>
    </div>
    
    <div id="info">C为中心 · 左右各2个八度</div>

    <script>
        // ==================== 初始化画布 ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const visualizerCanvas = document.getElementById('visualizer');
        const visualizerCtx = visualizerCanvas.getContext('2d');
        const hint = document.getElementById('hint');
        const info = document.getElementById('info');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            visualizerCanvas.width = window.innerWidth;
            visualizerCanvas.height = 120;
        }
        resize();
        window.addEventListener('resize', resize);

        // ==================== 音频系统 ====================
        let audioContext = null;
        let masterGain = null;
        let analyser = null;
        let isPlaying = false;

        // C4 = 261.63 Hz (中央C)
        const CENTER_FREQ = 261.63;
        // 左右各2个八度，即4个八度范围
        // 最低: C2 = 65.41 Hz, 最高: C6 = 1046.50 Hz

        function initAudio() {
            if (audioContext) return;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // 主音量控制
            masterGain = audioContext.createGain();
            masterGain.gain.value = 0.3;
            
            // 分析器用于可视化
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            
            masterGain.connect(analyser);
            analyser.connect(audioContext.destination);
        }

        // 计算频率: X轴位置映射到频率
        function getFrequency(x) {
            const ratio = x / canvas.width;
            // 从C2到C6，共4个八度
            // C2 = 65.41, C6 = 1046.50
            const minFreq = CENTER_FREQ / 4;  // C2
            const maxFreq = CENTER_FREQ * 4;  // C6
            
            // 使用对数刻度让音高变化更自然
            const logMin = Math.log2(minFreq);
            const logMax = Math.log2(maxFreq);
            const logFreq = logMin + ratio * (logMax - logMin);
            
            return Math.pow(2, logFreq);
        }

        // 计算音量: Y轴位置映射到音量 (底部大，顶部小)
        function getVolume(y) {
            // Y=0 (顶部) 音量最小, Y=height (底部) 音量最大
            const ratio = 1 - (y / canvas.height);
            return Math.max(0.01, Math.min(1, ratio));
        }

        // 获取音符名称
        function getNoteName(freq) {
            const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const A4 = 440;
            const semitones = Math.round(12 * Math.log2(freq / A4));
            const noteIndex = ((semitones % 12) + 12) % 12;
            const octave = Math.floor((semitones + 9) / 12) + 4;
            return noteNames[noteIndex] + octave;
        }

        // ==================== 声音合成器 ====================
        class Voice {
            constructor() {
                this.oscillators = [];
                this.gainNode = null;
                this.filterNode = null;
            }

            start(freq, volume) {
                // 创建丰富的音色: 锯齿波 + 三角波 + 正弦波
                const waveTypes = ['sawtooth', 'triangle', 'sine'];
                const detunes = [0, -5, 7]; // 微小失谐增加厚度
                const gains = [0.4, 0.35, 0.25];

                this.gainNode = audioContext.createGain();
                this.filterNode = audioContext.createBiquadFilter();
                this.filterNode.type = 'lowpass';
                this.filterNode.frequency.value = 3000;

                waveTypes.forEach((type, i) => {
                    const osc = audioContext.createOscillator();
                    osc.type = type;
                    osc.frequency.value = freq;
                    osc.detune.value = detunes[i];
                    
                    const oscGain = audioContext.createGain();
                    oscGain.gain.value = gains[i];
                    
                    osc.connect(oscGain);
                    oscGain.connect(this.filterNode);
                    osc.start();
                    
                    this.oscillators.push(osc);
                });

                this.filterNode.connect(this.gainNode);
                this.gainNode.connect(masterGain);

                // 平滑音量变化
                this.gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                this.gainNode.gain.linearRampToValueAtTime(volume, audioContext.currentTime + 0.05);
            }

            update(freq, volume) {
                this.oscillators.forEach(osc => {
                    osc.frequency.setValueAtTime(freq, audioContext.currentTime);
                });
                this.gainNode.gain.setTargetAtTime(volume, audioContext.currentTime, 0.02);
                
                // 根据频率调整滤波器
                this.filterNode.frequency.setTargetAtTime(freq * 4, audioContext.currentTime, 0.1);
            }

            stop() {
                const now = audioContext.currentTime;
                this.gainNode.gain.cancelScheduledValues(now);
                this.gainNode.gain.setValueAtTime(this.gainNode.gain.value, now);
                this.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                
                this.oscillators.forEach(osc => {
                    osc.stop(now + 0.3);
                });
                
                setTimeout(() => {
                    this.oscillators = [];
                }, 400);
            }
        }

        let currentVoice = null;

        // ==================== 视觉粒子系统 ====================
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 重力
                this.life -= this.decay;
                this.radius *= 0.98;
            }

            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        let particles = [];
        let ripples = [];
        let activeTouches = new Map();

        // ==================== 涟漪效果 ====================
        class Ripple {
            constructor(x, y, freq) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 100 + freq / 10;
                this.life = 1;
                this.hue = (freq / 20) % 360;
            }

            update() {
                this.radius += 3;
                this.life = 1 - (this.radius / this.maxRadius);
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life * 0.5;
                ctx.strokeStyle = `hsl(${this.hue}, 70%, 50%)`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        // ==================== 绘制音高参考线 ====================
        function drawPitchGuides() {
            const noteNames = ['C2', 'D2', 'E2', 'F2', 'G2', 'A2', 'B2', 
                             'C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3',
                             'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4',
                             'C5', 'D5', 'E5', 'F5', 'G5', 'A5', 'B5', 'C6'];
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';

            noteNames.forEach(note => {
                // 解析音符
                const octave = parseInt(note.slice(-1));
                const noteBase = note.slice(0, -1);
                const semitoneMap = { 'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6, 'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'B': 11 };
                const semitone = semitoneMap[noteBase];
                const A4 = 440;
                const noteFreq = A4 * Math.pow(2, (octave - 4) + (semitone - 9) / 12);
                
                // 反向计算X位置
                const minFreq = CENTER_FREQ / 4;
                const maxFreq = CENTER_FREQ * 4;
                const logMin = Math.log2(minFreq);
                const logMax = Math.log2(maxFreq);
                const logFreq = Math.log2(noteFreq);
                const x = ((logFreq - logMin) / (logMax - logMin)) * canvas.width;
                
                // 只绘制在屏幕内的
                if (x >= 0 && x <= canvas.width) {
                    // 中央C高亮
                    if (note === 'C4') {
                        ctx.strokeStyle = 'rgba(255, 200, 100, 0.3)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(255, 200, 100, 0.5)';
                        ctx.fillText('C4', x, canvas.height - 20);
                    } else if (noteBase === 'C') {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                }
            });
        }

        // ==================== 可视化频谱 ====================
        function drawVisualizer() {
            if (!analyser) return;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);
            
            visualizerCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            visualizerCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            
            const barWidth = visualizerCanvas.width / bufferLength * 4;
            let x = 0;
            
            for (let i = 0; i < bufferLength; i += 4) {
                const barHeight = (dataArray[i] / 255) * visualizerCanvas.height * 0.8;
                const hue = (i / bufferLength) * 360;
                
                visualizerCtx.fillStyle = `hsla(${hue}, 80%, 50%, 0.6)`;
                visualizerCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth - 1, barHeight);
                
                x += barWidth;
            }
        }

        // ==================== 主动画循环 ====================
        function animate() {
            // 主画布: 半透明覆盖实现拖尾
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制音高参考
            drawPitchGuides();
            
            // 更新和绘制涟漪
            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].update();
                ripples[i].draw(ctx);
                if (ripples[i].life <= 0) {
                    ripples.splice(i, 1);
                }
            }
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 绘制当前触摸位置的指示
            activeTouches.forEach((touch, id) => {
                const freq = getFrequency(touch.x);
                const hue = (freq / 20) % 360;
                
                // 发光圆环
                ctx.globalAlpha = 0.3 + touch.volume * 0.5;
                const gradient = ctx.createRadialGradient(
                    touch.x, touch.y, 0,
                    touch.x, touch.y, 40 + touch.volume * 60
                );
                gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.5)`);
                gradient.addColorStop(0.5, `hsla(${hue}, 80%, 50%, 0.2)`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 40 + touch.volume * 60, 0, Math.PI * 2);
                ctx.fill();
                
                // 中心点
                ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
                ctx.beginPath();
                ctx.arc(touch.x, touch.y, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // 频率文字
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${getNoteName(freq)} ${Math.round(freq)}Hz`, touch.x, touch.y - 15);
                
                ctx.globalAlpha = 1;
            });
            
            // 绘制可视化
            drawVisualizer();
            
            requestAnimationFrame(animate);
        }

        animate();

        // ==================== 交互处理 ====================
        let hintHidden = false;

        function hideHint() {
            if (!hintHidden) {
                hintHidden = true;
                hint.style.opacity = '0';
                hint.style.transform = 'translate(-50%, -60%)';
                setTimeout(() => {
                    hint.style.display = 'none';
                    info.style.opacity = '1';
                }, 2000);
            }
        }

        function createParticles(x, y, freq, count = 15) {
            const hue = (freq / 20) % 360;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, hue + Math.random() * 40 - 20));
            }
        }

        function startSound(x, y, id) {
            initAudio();
            hideHint();
            
            const freq = getFrequency(x);
            const volume = getVolume(y);
            
            const voice = new Voice();
            voice.start(freq, volume);
            
            activeTouches.set(id, {
                x: x,
                y: y,
                voice: voice,
                volume: volume,
                freq: freq
            });
            
            ripples.push(new Ripple(x, y, freq));
            createParticles(x, y, freq, 20);
        }

        function updateSound(x, y, id) {
            const touch = activeTouches.get(id);
            if (!touch) return;
            
            touch.x = x;
            touch.y = y;
            
            const freq = getFrequency(x);
            const volume = getVolume(y);
            touch.volume = volume;
            touch.freq = freq;
            
            touch.voice.update(freq, volume);
            
            // 偶尔产生粒子
            if (Math.random() < 0.3) {
                createParticles(x, y, freq, 2);
            }
        }

        function stopSound(id) {
            const touch = activeTouches.get(id);
            if (!touch) return;
            
            touch.voice.stop();
            activeTouches.delete(id);
        }

        // 鼠标事件
        let mouseDown = false;
        
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            startSound(e.clientX, e.clientY, 'mouse');
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                updateSound(e.clientX, e.clientY, 'mouse');
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            mouseDown = false;
            stopSound('mouse');
        });
        
        canvas.addEventListener('mouseleave', () => {
            if (mouseDown) {
                mouseDown = false;
                stopSound('mouse');
            }
        });

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                startSound(touch.clientX, touch.clientY, touch.identifier);
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                updateSound(touch.clientX, touch.clientY, touch.identifier);
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                stopSound(touch.identifier);
            }
        });
        
        canvas.addEventListener('touchcancel', (e) => {
            for (let touch of e.changedTouches) {
                stopSound(touch.identifier);
            }
        });

        // 键盘支持: 空格键切换延音
        let sustain = false;
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                sustain = !sustain;
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
